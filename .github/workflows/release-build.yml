name: release-build

on:
  push:
    tags:
      - 'release/[0-9]+.[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:
    inputs:
      version:
        type: string
        required: true
        description: 'Version (e.g., 1.0.0.0)'

permissions:
  contents: read

jobs:
  parse-version:
    runs-on: ubuntu-latest

    outputs:
      version: ${{ steps.extract.outputs.version }}

    steps:
      - name: Extract version
        id: extract
        run: |
          if [[ '${{ github.event_name }}' == 'workflow_dispatch' ]]; then
            version='${{ inputs.version }}'
          else
            version="${GITHUB_REF_NAME#release/}"
          fi
          echo "version=${version}" >> "$GITHUB_OUTPUT"

  build:
    runs-on: windows-2025-vs2026
    needs: parse-version

    strategy:
      matrix:
        include:
          - processor_architecture: x86
            platform: x86
          - processor_architecture: x64
            platform: x64
          - processor_architecture: arm64
            platform: ARM64

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup .NET
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5.2.0
        with:
          dotnet-version: 10.0.x
          cache: true
          cache-dependency-path: '**/packages.lock.json'

      - uses: microsoft/setup-WinAppCli@cc8ea9a08b3ee3db43d5aa6bddda4a0e87d800f7 # v0.1.0

      - name: Build
        run: >
          dotnet build
          --configuration Release
          --no-incremental
          --no-logo
          --arch ${{ matrix.processor_architecture }}
          -p:Platform=${{ matrix.platform }}
          -bl:artifacts/logs/build-${{ matrix.processor_architecture }}.binlog

      - name: Test
        if: matrix.processor_architecture != 'arm64'
        run: >
          dotnet test
          --configuration Release
          --no-build
          --no-restore
          --arch ${{ matrix.processor_architecture }}
          --no-ansi
          --no-progress
          --no-launch-profile

      - name: Publish
        run: >
          dotnet publish Hexblick/Hexblick.csproj
          --configuration Release
          --no-build
          --no-restore
          --no-logo
          --arch ${{ matrix.processor_architecture }}
          -p:Platform=${{ matrix.platform }}
          -bl:artifacts/logs/publish-${{ matrix.processor_architecture }}.binlog

      - name: Shutdown build server
        if: always()
        run: >
          dotnet build-server shutdown

      - name: Pack
        run: >
          winapp pack artifacts/publish/Hexblick/release_win-${{ matrix.processor_architecture }}
          --manifest Hexblick/appxmanifest.xml
          --output artifacts/msix/Hexblick-${{ matrix.processor_architecture }}.msix

      - name: Upload MSIX
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: msix-${{ matrix.processor_architecture }}
          path: artifacts/msix/Hexblick-${{ matrix.processor_architecture }}.msix
          if-no-files-found: error
          archive: false

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: logs-${{ matrix.processor_architecture }}
          path: artifacts/logs/
          if-no-files-found: ignore

  bundle:
    runs-on: windows-2025-vs2026
    needs: [parse-version, build]

    steps:
      - uses: microsoft/setup-WinAppCli@cc8ea9a08b3ee3db43d5aa6bddda4a0e87d800f7 # v0.1.0

      - name: Download MSIX artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: msix-*
          path: artifacts/msix
          merge-multiple: true

      - name: Bundle
        run: >
          winapp tool makeappx bundle
          /d artifacts/msix
          /p artifacts/bundle/Hexblick.msixbundle
          /bv ${{ needs.validate.outputs.version }}
          /o

      - name: Upload bundle
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: msixbundle
          path: artifacts/bundle/Hexblick.msixbundle
          if-no-files-found: error
          archive: false

      - uses: microsoft/microsoft-store-apppublisher@b76227f539d68e6465f79bbbc82ed92f61081aa4 # v1.3
        if: false
