name: release-build

on:
  workflow_dispatch:
    inputs:
      version:
        type: string
        required: true
        description: 'Version to release (e.g., 1.0.0)'

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-2025-vs2026

    strategy:
      matrix:
        processor_architecture: ['x86', 'x64', 'arm64']

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup .NET
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5.2.0
        with:
          dotnet-version: 10.0.x
          architecture: ${{ matrix.processor_architecture }}
          cache: true
          cache-dependency-path: '**/packages.lock.json'

      - uses: microsoft/setup-WinAppCli@cc8ea9a08b3ee3db43d5aa6bddda4a0e87d800f7 # v0.1.0

      - name: Build
        run: >
          dotnet build
          --configuration Release
          --no-incremental
          --no-logo
          --arch ${{ matrix.processor_architecture }}
          --disable-build-servers

      - name: Test
        if: matrix.processor_architecture != 'arm64'
        run: >
          dotnet test
          --configuration Release
          --no-build
          --no-restore
          --arch ${{ matrix.processor_architecture }}
          --no-ansi
          --no-progress
          --no-launch-profile
