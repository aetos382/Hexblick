name: release-build

on:
  workflow_dispatch:
    inputs:
      version:
        type: string
        required: true
        description: 'Version (e.g., 1.0.0.0)'
      release:
        type: boolean
        required: false
        default: false
        description: 'Create GitHub Release'

permissions:
  contents: read

jobs:
  parse-version:
    runs-on: ubuntu-slim

    outputs:
      version: ${{ steps.extract.outputs.version }}

    steps:
      - name: Validate version
        run: |
          version='${{ inputs.version }}'
          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Invalid version format: ${version} (expected X.X.X.X)"
            exit 1
          fi

      - name: Extract version
        id: extract
        run: echo "version=${{ inputs.version }}" >> "$GITHUB_OUTPUT"

  build:
    runs-on: windows-2025-vs2026
    needs: parse-version

    permissions:
      actions: read
      checks: write
      contents: write

    strategy:
      matrix:
        include:
          - processor_architecture: x86
            platform: x86
          - processor_architecture: x64
            platform: x64
          - processor_architecture: arm64
            platform: arm64

    env:
      VERSION: ${{ needs.parse-version.outputs.version }}
      MSIX_NAME: Hexblick-${{ matrix.processor_architecture }}-${{ needs.parse-version.outputs.version }}.msix

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup .NET
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5.2.0
        with:
          dotnet-version: 10.0.x
          cache: true
          cache-dependency-path: '**/packages.lock.json'

      - uses: microsoft/setup-WinAppCli@cc8ea9a08b3ee3db43d5aa6bddda4a0e87d800f7 # v0.1.0

      - name: Set version
        shell: pwsh
        run: |
          $version = '${{ env.VERSION }}'

          $targets = [xml](Get-Content -Raw Directory.Build.targets)
          $versionNodes = $targets.SelectNodes('/Project/PropertyGroup/Version')
          $versionNodes[-1].InnerText = $version
          $targets.Save("$PWD/Directory.Build.targets")

          $manifest = [xml](Get-Content -Raw Hexblick/Package.appxmanifest)
          $manifest.Package.Identity.Version = $version
          $manifest.Save("$PWD/Hexblick/Package.appxmanifest")

          $appManifest = [xml](Get-Content -Raw Hexblick/app.manifest)
          $ns = New-Object System.Xml.XmlNamespaceManager($appManifest.NameTable)
          $ns.AddNamespace('asm', 'urn:schemas-microsoft-com:asm.v1')
          $appManifest.SelectSingleNode('/asm:assembly/asm:assemblyIdentity', $ns).version = $version
          $appManifest.Save("$PWD/Hexblick/app.manifest")

      - name: Build
        run: >
          dotnet build
          --configuration Release
          --no-incremental
          --no-logo
          --arch ${{ matrix.processor_architecture }}
          -p:Platform=${{ matrix.platform }}
          -bl:artifacts/logs/build-${{ matrix.processor_architecture }}.binlog

      - name: Test
        id: test
        if: matrix.processor_architecture != 'arm64'
        run: >
          dotnet test
          --configuration Release
          --no-build
          --no-restore
          -p:Platform=${{ matrix.platform }}
          --no-ansi
          --no-progress
          --report-trx
          --report-trx-filename test-results.trx
          --results-directory artifacts/test-results

      - name: Report test results
        if: steps.test.conclusion != 'skipped' && !cancelled()
        uses: dorny/test-reporter@a43b3a5f7366b97d083190328d2c652e1a8b6aa2 # v3.0.0
        with:
          name: Test results (${{ matrix.processor_architecture }})
          path: artifacts/test-results/test-results.trx
          reporter: dotnet-trx
          fail-on-error: false

      - name: Publish
        run: >
          dotnet publish Hexblick/Hexblick.csproj
          --no-build
          --no-restore
          --no-logo
          --arch ${{ matrix.processor_architecture }}
          -p:Platform=${{ matrix.platform }}
          -bl:artifacts/logs/publish-${{ matrix.processor_architecture }}.binlog

      - name: Shutdown build server
        if: always()
        run: dotnet build-server shutdown

      - name: Pack
        run: >
          winapp pack artifacts/publish/Hexblick/${{ env.VERSION }}/release_win-${{ matrix.processor_architecture }}
          --manifest Hexblick/Package.appxmanifest
          --output artifacts/msix/${{ env.MSIX_NAME }}
          --executable Hexblick.exe

      - name: Upload MSIX
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          path: artifacts/msix/${{ env.MSIX_NAME }}
          if-no-files-found: error
          archive: false

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: logs-${{ matrix.processor_architecture }}
          path: artifacts/logs/
          if-no-files-found: ignore

      - name: Dependency submission
        uses: advanced-security/component-detection-dependency-submission-action@9c110eb34dee187cd9eca76a652b9f6a0ed22927 # v0.1.1
        with:
          detectorsCategories: DotNet,NuGet
          detectorArgs: MSBuildBinaryLog=EnableIfDefaultOff

  bundle:
    runs-on: windows-2025-vs2026
    needs: [parse-version, build]

    env:
      VERSION: ${{ needs.parse-version.outputs.version }}
      BUNDLE_NAME: Hexblick-${{ needs.parse-version.outputs.version }}.msixbundle

    steps:
      - uses: microsoft/setup-WinAppCli@cc8ea9a08b3ee3db43d5aa6bddda4a0e87d800f7 # v0.1.0

      - name: Download MSIX artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: Hexblick-*.msix
          path: artifacts/msix
          merge-multiple: true
          skip-decompress: true

      - name: Bundle
        run: >
          winapp tool makeappx bundle
          /d artifacts/msix
          /p artifacts/bundle/${{ env.BUNDLE_NAME }}
          /bv ${{ env.VERSION }}
          /o

      - name: Upload bundle
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: msixbundle
          path: artifacts/bundle/${{ env.BUNDLE_NAME }}
          if-no-files-found: error
          archive: false

      - uses: microsoft/microsoft-store-apppublisher@b76227f539d68e6465f79bbbc82ed92f61081aa4 # v1.3
        if: false

  github-release:
    runs-on: ubuntu-slim
    needs: [parse-version, bundle]
    if: inputs.release == true

    env:
      VERSION: ${{ needs.parse-version.outputs.version }}
      BUNDLE_NAME: Hexblick-${{ needs.parse-version.outputs.version }}.msixbundle

    permissions:
      contents: write

    steps:
      - name: Download bundle
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ env.BUNDLE_NAME }}
          path: artifacts/bundle

      - name: Create GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          tag_name: release/${{ env.VERSION }}
          name: ${{ env.VERSION }}
          files: artifacts/bundle/${{ env.BUNDLE_NAME }}
          draft: true
          generate_release_notes: true
